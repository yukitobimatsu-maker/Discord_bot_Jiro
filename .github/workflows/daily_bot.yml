name: Daily Discord AI Bot

on:
  # 外部（cron-job.orgなど）からのHTTPリクエストを受け付ける設定
  repository_dispatch:
    types: [trigger-black-cat-bot] # 任意のイベント名
  workflow_dispatch: # 手動実行ボタンも残しておきます

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth google-api-python-client groq

    - name: Execute Bot Script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python main.py
