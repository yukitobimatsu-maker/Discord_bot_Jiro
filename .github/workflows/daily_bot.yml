name: Daily Discord AI Bot

on:
  schedule:
    # 毎日 UTC 21:30（日本時間 翌朝 6:30）に自動実行
    # ※GitHubの共有サーバーの混雑状況により、実際は6:40〜6:55頃に発火することがあります
    - cron: '30 21 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth google-api-python-client groq

    - name: Execute Bot Script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python main.py
